<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aszar • Baccarat</title>
  <link rel="stylesheet" href="/css/baccarat.css" />
</head>
    <body>
       <div id="appLoader" class="app-loader">
  <img class="logoLoader" src="/assets/logo.png" alt="Rollix" />
</div>
        <div id="appRoot">
            <header class="topbar">
    <div class="topbar-left">
        <a class="brand" href="/dashboard" aria-label="Rollix Dashboard">
        <img class="brand-logo" src="/assets/logo.png" alt="Rollix" />
        </a>
    </div>

    <div class="topbar-right">
     <div class="profile-menu-wrap wallet-menu-wrap" id="walletMenuWrap">
  <div class="wallet-group">
    <button class="wallet-balance" id="walletToggleBtn" type="button">
      <span class="wallet-amount" id="balance">0</span>
      <span class="wallet-unit" id="balanceUnit"></span>
    </button>

    <button class="wallet-action" id="depositBtn" type="button"
      aria-haspopup="menu" aria-expanded="false">
      Wallet
    </button>
  </div>

  <div class="profile-menu" id="walletMenu" role="menu" aria-label="Wallet menu">
    <button class="profile-menu-item" role="menuitem" type="button" data-action="daily">
      Daily rewards
    </button>

    <div class="profile-menu-sep" role="separator" aria-hidden="true"></div>

     <button class="profile-menu-item" id="balanceMenu" role="menuitem" type="button" data-action="balanceSettings">
  Balance settings
</button>
  </div>
</div>

   <div class="profile-menu-wrap" id="profileMenuWrap">
  <button class="profile-btn" id="profileBtn" type="button" aria-label="Profile" aria-haspopup="menu" aria-expanded="false">
    <svg class="profile-icon" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/>
      <path d="M4 20c0-4.2 3.6-7 8-7s8 2.8 8 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
  </button>

  <div class="profile-menu" id="profileMenu" role="menu" aria-label="Profile menu">
    <button class="profile-menu-item" role="menuitem" type="button" data-action="account">
      Account settings
    </button>

    <div class="profile-menu-sep" role="separator" aria-hidden="true"></div>

    <button class="profile-menu-item danger" role="menuitem" type="button" data-action="logout">
      Logout
    </button>
  </div>
</div>
    </div>
    </header>
    <main class="page">
        <section class="bj-wrap" aria-label="Blackjack table">
        <div class="bj-table">
   <div class="bj-topbar">
  <div class="bj-topbar-left">
    <span class="bj-game-ico" aria-hidden="true">♣</span>
    <button class="bj-title-btn" id="rulesBtn" type="button">Baccarat</button>
  </div>

  <div class="bj-topbar-right">
    <div class="rl-history-mask bc-history-mask" id="bcHistoryMask">
      <div class="rl-history bc-history" id="bcHistory" aria-label="Baccarat history"></div>
    </div>
  </div>
</div>

            <div class="bj-surface">
              <svg id="bacAnimLayer" class="bac-stage"></svg>
            <div class="bj-center">
           <div class="bac-betting" aria-label="Baccarat betting options">
  <button class="bac-bet-btn" id="player" type="button" data-bet="player">
    <span class="bac-bet-text">PLAYER</span>
  </button>

  <button class="bac-bet-btn" id="tie" type="button" data-bet="tie">
    <span class="bac-bet-text">TIE</span>
  </button>

  <button class="bac-bet-btn" id="banker" type="button" data-bet="banker">
    <span class="bac-bet-text">BANKER</span>
  </button>
</div>
        
    <div class="bj-deck-svg" aria-hidden="true">
    <img src="/assets/q.png" alt="Deck" draggable="false" style="
        width: 60px;">
    </div>
 
            </div>
<div class="bc-table-actions" aria-label="Table actions">
  <button class="bc-table-btn bc-clear-btn" type="button" id="bcClearBtn">Clear</button>
  <button class="bc-table-btn bc-undo-btn" type="button" id="bcUndoBtn">Undo</button>
</div>
        </div>

    </main>
     <div class="roulette-controls">

  <button class="spin-btn" type="button" aria-label="Spin the wheel">
    Deal
  </button>
  <span id="total">Total Bet</span>
<div class="rl-bet-panel" aria-label="Total bet panel">
  <div class="rl-bet-display" aria-label="Total bet amount">
    <span class="wallet-unit wallet-currency rl-wallet-unit" id="currency"></span>
    <span class="rl-bet-value">0.00</span>
  </div>

  <div class="rl-bet-quick" aria-label="Quick bet actions">
    <button class="rl-bet-qbtn" type="button" data-set="half">1/2</button>
    <button class="rl-bet-qbtn" type="button" data-set="2x">2x</button>
  </div>
</div>
  <div class="chip-selector" aria-label="Chip selector">
    <button class="chip-nav" type="button" aria-label="Previous chips">
      ‹
    </button>

       <div class="chip-window">
      <div class="chip-track">
        <button class="chip" type="button" aria-label="Bet 1" data-value="1">
          <span class="bj-chip-label" style="color: #00000096;">1</span>
          <img class="chip5" src="/assets/casino-chip.png" alt="Deck" draggable="false" style="width: 42px;">
        </button>
        <button class="chip" type="button" aria-label="Bet 5" data-value="5">
          <span class="bj-chip-label" style="color: #00000096;">5</span>
          <img class="chip10" src="/assets/casino-chip.png" alt="Deck" draggable="false" style="width: 42px;">
        </button>
        <button class="chip" type="button" aria-label="Bet 50" data-value="25">
          <span class="bj-chip-label" style="color: #00000096;">25</span>
          <img class="chip25" src="/assets/casino-chip.png" alt="Deck" draggable="false" style="width: 42px; ">
        </button>
        <button class="chip" type="button" aria-label="Bet 100" data-value="50">
          <span class="bj-chip-label" style="color: #00000096;">50</span>
          <img class="chip50" src="/assets/casino-chip.png" alt="Deck" draggable="false" style="width: 42px;">
        </button>
        <button class="chip" type="button" aria-label="Bet 250" data-value="100">
          <span class="bj-chip-label" style="color: #00000096;">100</span>
          <img class="chip100" src="/assets/casino-chip.png" alt="Deck" draggable="false" style="width: 42px;">
        </button>
        <button class="chip" type="button" aria-label="Bet 500" data-value="500">
          <span class="bj-chip-label" style="color: #00000096;">500</span>
          <img class="chip500" src="/assets/casino-chip.png" alt="Deck" draggable="false" style="width: 42px;">
        </button>
        <button class="chip" type="button" aria-label="Bet 1000" data-value="1000">
          <span class="bj-chip-label" style="color: #00000096;">1K</span>
          <img class="chip1000" src="/assets/casino-chip.png" alt="Deck" draggable="false" style="width: 42px;">
        </button>
<button class="chip" type="button" aria-label="Bet 5000" data-value="5000">
  <span class="bj-chip-label" style="color:#00000096;">5K</span>

<button class="chip" type="button" aria-label="Bet 10000" data-value="10000">

</button>
<button class="chip" type="button" aria-label="Bet 5000" data-value="50000">
  <span class="bj-chip-label" style="color:#00000096;">50K</span>
  <img class="chip50000" src="/assets/casino-chip.png" alt="" draggable="false" style="width:42px;">
</button>

<button class="chip" type="button" aria-label="Bet 10000" data-value="100000">
  <span class="bj-chip-label" style="color:#00000096;">100K</span>
  <img class="chip100000" src="/assets/casino-chip.png" alt="" draggable="false" style="width:42px;">
</button>
<button class="chip" type="button" aria-label="Bet 5000" data-value="200000">
  <span class="bj-chip-label" style="color:#00000096;">200K</span>
  <img class="chip200000" src="/assets/casino-chip.png" alt="" draggable="false" style="width:42px;">
</button>

<button class="chip" type="button" aria-label="Bet 10000" data-value="500000">
  <span class="bj-chip-label" style="color:#00000096;">500K</span>
  <img class="chip500000" src="/assets/casino-chip.png" alt="" draggable="false" style="width:42px;">
</button>

<button class="chip" type="button" aria-label="Bet 1000000" data-value="1000000">
  <span class="bj-chip-label" style="color:#00000096;">1M</span>
  <img class="chip1000000" src="/assets/casino-chip.png" alt="" draggable="false" style="width:42px;">
</button>

<button class="chip" type="button" aria-label="Bet 5000000" data-value="5000000">
  <span class="bj-chip-label" style="color:#00000096;">5M</span>
  <img class="chip5000000" src="/assets/casino-chip.png" alt="" draggable="false" style="width:42px;">
</button>
      </div>
    </div>

    <button class="chip-nav" type="button" aria-label="Next chips">
      ›
    </button>
  </div>
</div>
        </div>
<div class="modal-backdrop" id="accountModal" aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true" aria-label="Account settings">
    <div class="modal-head">
      <div class="modal-title">Account Settings</div>
      <button class="modal-x" id="accountModalClose" type="button" aria-label="Close">✕</button>
    </div>

    <div class="modal-body">
      <div class="modal-section">
        <div class="modal-section-title">Account</div>

        <div class="kv">
          <div class="k">Username</div>
          <div class="v" id="acctUsername">—</div>
        </div>

        <div class="kv">
          <div class="k">Email</div>
          <div class="v" id="acctEmail">—</div>
        </div>

        <div class="row-actions">
          <button class="btn-lite" id="showEmail" type="button">Show Email</button>
        </div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Security</div>

        <form id="changePasswordForm" class="form">
          <label class="field">
            <span>Current password</span>
            <input id="pwCurrent" type="password" autocomplete="current-password" required />
          </label>

          <label class="field">
            <span>New password</span>
            <input id="pwNew" type="password" autocomplete="new-password" minlength="8" required />
          </label>

          <label class="field">
            <span>Confirm new password</span>
            <input id="pwConfirm" type="password" autocomplete="new-password" minlength="8" required />
          </label>

       <button class="btn-primary" id="pwSubmitBtn" type="submit">
   <span id="pwBtnText">Change password</span>
  <span class="btn-spinner" id="pwSpinner" aria-hidden="true"></span>
</button>
  <div id="pwMsg" class="pw-msg"></div>
  </form>
      </div>

 <div class="modal-footer">
  <button class="btn-primary" id="logoutBtnModal" type="button">Logout</button>
</div>
    </div>
  </div>
</div>
<div class="modal-backdrop" id="dailyRewardsModal" aria-hidden="true">
  <div class="modal-card daily-modal-card" role="dialog" aria-modal="true" aria-label="Daily rewards">
    <div class="modal-head daily-modal-head">
      <div class="modal-title daily-title">Daily Rewards</div>
      <button class="modal-x" id="dailyRewardsClose" type="button" aria-label="Close">✕</button>
    </div>

    <div class="modal-body daily-modal-body">
      <div class="daily-subtext">
        Claim every day to build your streak and unlock bigger rewards.
      </div>

   <div class="daily-streak" id="dailyStreak"></div>

<div class="daily-today" id="dailyTodayText"></div>

      <button class="btn-primary daily-claim-btn" id="dailyClaimBtn" type="button">
        Claim Daily Reward
      </button>

      <div class="form-hint" id="dailyMsg"></div>
    </div>
  </div>
</div>
<div class="modal-backdrop" id="balanceSettingsModal" aria-hidden="true">
  <div class="modal-card daily-modal-card" role="dialog" aria-modal="true" aria-label="Balance settings">
    <div class="modal-head daily-modal-head">
      <div class="modal-title daily-title">Balance Settings</div>
      <button class="modal-x" id="balanceSettingsClose" type="button" aria-label="Close">✕</button>
    </div>

    <div class="modal-body daily-modal-body">
      <div class="daily-subtext" id="balanceTxt">
        BALANCE
      </div>

    <div class="balance-settings-box">
  <div class="balance-settings-amount">
    <span id="balanceSettingsAmount">0</span>
    <span id="balanceSettingsUnit" class="balance-settings-unit"></span>
  </div>
</div>
<div class="balance-accounts">
  <div class="balance-accounts-head">
    <div class="balance-accounts-title">Accounts</div>
  </div>
  <div class="balance-accounts-list" id="savingsAccountsList">
    <div class="balance-account-empty" id="savingsEmptyState">No accounts yet.</div>
  </div>
  <div class="savings-detail" id="savingsDetail" aria-hidden="true">
    <div class="savings-detail-head">
      <div class="savings-detail-name" id="savingsDetailName">Account</div>

      <div class="savings-detail-balance">
        <span id="savingsDetailAmount">$0</span>
      </div>

      <button class="modal-x savings-detail-x" id="savingsDetailClose" type="button" aria-label="Close">✕</button>
    </div>

    <div class="savings-detail-body">
      <div class="savings-detail-row">
        <input id="savingsDetailWithdrawInput" class="savings-detail-input" type="text" inputmode="decimal"
          placeholder="0.00" autocomplete="off" />
        <button class="btn-primary savings-detail-btn" id="savingsDetailWithdrawBtn" type="button">Withdraw</button>
      </div>

      <div class="savings-detail-row">
        <input id="savingsDetailDepositInput" class="savings-detail-input" type="text" inputmode="decimal"
          placeholder="0.00" autocomplete="off" />
        <button class="btn-primary savings-detail-btn" id="savingsDetailDepositBtn" type="button">Deposit</button>
      </div>

      <div class="form-hint" id="savingsDetailMsg"></div>

      <button class="btn-primary savings-detail-delete" id="savingsDetailDeleteBtn" type="button">
        Delete account
      </button>
    </div>
  </div>
  <button class="balance-plus-btn btn-primary" id="createSavingsBtn" type="button" aria-label="Create account">
    <span aria-hidden="true">+</span>
  </button>
</div>
    

      <div class="form-hint" id="balanceSettingsMsg"></div>
    </div>
  </div>
</div>
<div class="modal-backdrop" id="createSavingsModal" aria-hidden="true">
  <div class="modal-card daily-modal-card" id="createAccount" role="dialog" aria-modal="true" aria-label="Create savings account">
    <div class="modal-head daily-modal-head">
      <div class="modal-title daily-title">Create Account</div>
      <button class="modal-x" id="createSavingsClose" type="button" aria-label="Close">✕</button>
    </div>

    <div class="modal-body daily-modal-body" >
    

      <form class="form" id="createSavingsForm" autocomplete="off">
        <label class="field">
          <span>Account name</span>
          <input id="savingsNameInput" type="text" maxlength="30" placeholder="e.g. Savings" required />
        </label>

        <label class="field">
          <span>Deposit amount</span>
          <input id="savingsDepositInput" type="text"  placeholder="0" />
        </label>
   <div class="form-hint" id="createSavingsMsg"></div>
        <div class="balance-popup-actions">
          <button class="btn-primary" id="createSavingsCancel" type="button" style="width: 65px;">Cancel</button>
          <button class="btn-primary" id="createSavingsSave" type="submit" style="width: 65px;">Save</button>
        </div>

     
      </form>
    </div>
  </div>
</div>
